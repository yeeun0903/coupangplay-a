<script>
/* AB_NAV_INJECT_START */
(function () {
  const HOME_SCREEN = "main_nopass";
  const CURRENT_SCREEN = "profile";
  const go = (screen) => { window.location.href = `../${screen}/index.html`; };

  const bind = (selector, screen) => {
    document.querySelectorAll(selector).forEach((el) => {
      el.style.cursor = "pointer";
      el.setAttribute("role", "button");
      el.addEventListener("click", function(e) {
        e.preventDefault();
        e.stopPropagation();
        go(screen);
      });
    });
  };

  const bindText = (text, screen) => {
    const target = (text || "").replace(/\s+/g, "");
    document.querySelectorAll("button, a, div, p, span").forEach((el) => {
      const value = (el.textContent || "").replace(/\s+/g, "");
      if (value.includes(target) && value.length <= target.length + 18) {
        el.style.cursor = "pointer";
        el.setAttribute("role", "button");
        el.addEventListener("click", function(e) {
          e.preventDefault();
          e.stopPropagation();
          go(screen);
        });
      }
    });
  };

  const block = (selector) => {
    document.querySelectorAll(selector).forEach((el) => {
      el.style.cursor = "default";
      el.removeAttribute("role");
      el.addEventListener("click", function(e) {
        e.preventDefault();
        e.stopImmediatePropagation();
      }, true);
    });
  };

  // 하단 네비게이션은 홈/프로필만 활성화합니다.
  // 단, passhub/passdetail/profile 내부의 frame-4~6 같은 디자인 요소는 건드리지 않습니다.
  block(".continue-btn, .open-btn, .search-btn");
  if (CURRENT_SCREEN === "buyresult") {
    block(".frame-4, .frame-5, .frame-6");
    bind(".frame-3", HOME_SCREEN);
    bind(".frame-7", "profile");
    bind(".back-btn", "pass_combination");
    bind(".x-btn", HOME_SCREEN);
  } else {
    bind(".home-btn", HOME_SCREEN);
    bind(".profile-btn", "profile");
  }

  if (CURRENT_SCREEN === "popup") {
    bind(".x-btn", HOME_SCREEN);
    bind(".subscribe-btn", "passhub");
    bindText("지금 패스 구독하기", "passhub");
  }

  if (CURRENT_SCREEN === "mainyespass") {
    bind(".pass-btn", "passhub");
    bindText("쿠팡패스", "passhub");
  }

  if (CURRENT_SCREEN === "profile") {
    // 더블패스 passnowuse 프레임/내 패스 카드 클릭 시 패스 허브로 이동
    bind(".passnowuse, .passnowuse-btn, .pass-now-use, .pass-nowuse, .nowusepass, .nowusepass-profile, .frame-3", "passhub");
  }

  if (CURRENT_SCREEN === "passhub") {
    // 패스 허브의 6개 > 버튼 전부 passdetail로 이동
    bind(".arrow-btn, .arrow-btn-2, .arrow-btn-3, .arrow-btn-4, .arrow-btn-5", "passdetail");
    bind(".nowusepass-btn", "pass_combination");
    bindText("지금 바로 패스 이용하기", "pass_combination");
  }

  if (CURRENT_SCREEN === "passdetail") {
    bind(".arrow-left, .back-btn", "passhub");
    bind(".container, .x-btn", HOME_SCREEN);
    bindText("✕", HOME_SCREEN);
    bind(".subscribe-btn", "pass_combination");
    bindText("구독하러가기", "pass_combination");
  }

  // pass_combination의 선택/가격 변동 로직은 건드리지 않고, 시청하기 버튼만 연결
  if (CURRENT_SCREEN === "pass_combination") {
    bind(".header-topbar .view, .header-topbar .div-wrapper, .arrow-left, .back-btn", "passhub");
    bind("#watchButton", "buyresult");
  }

  bindText("지금 바로 시청하기", "buyresult");
})();
/* AB_NAV_INJECT_END */
</script>
